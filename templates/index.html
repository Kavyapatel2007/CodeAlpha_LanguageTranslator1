<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaSwift — Language Translator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-wrapper">
    <header class="app-header">
      <h1>🌐 LinguaSwift</h1>
      <p>Translate text instantly between 100+ languages</p>
    </header>

    <main class="translator-card">

      <div class="lang-bar">
        <select id="sourceLang" class="lang-select">
          <option value="auto">Detect Language</option>
          {% for name, code in languages.items() %}
            <option value="{{ code }}">{{ name.title() }}</option>
          {% endfor %}
        </select>

        <button id="swapBtn" class="swap-btn" title="Swap languages">⇄</button>

        <select id="targetLang" class="lang-select">
          {% for name, code in languages.items() %}
            <option value="{{ code }}" {% if code == 'en' %}selected{% endif %}>{{ name.title() }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="text-panels">
        <div class="panel">
          <textarea id="sourceText" placeholder="Type or paste text here..." maxlength="2000"></textarea>
          <div class="panel-footer">
            <span id="charCount">0 / 2000</span>
          </div>
        </div>

        <div class="panel output-panel">
          <div id="outputText" class="output-text" aria-live="polite">
            <span class="placeholder">Translation will appear here...</span>
          </div>
          <div class="panel-footer output-actions">
            <button id="speakBtn" class="icon-btn" title="Listen">🔊</button>
            <button id="copyBtn" class="icon-btn" title="Copy translation">📋</button>
          </div>
        </div>
      </div>

      <button id="translateBtn" class="translate-btn">Translate</button>

      <p id="statusMsg" class="status-msg"></p>
    </main>

    <footer class="app-footer">
      Built with Flask + deep-translator by Kavya Patel
    </footer>
  </div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
